        want: "war-sza-wa"
      - text: "przepraszam"
        want: "prze-pra-szam"
      - text: "dziękuję"
        want: "dzię-ku-ję"
      - text: "książka"
        want: "książ-ka"
      - text: "nauczyciel"
        want: "nau-czy-ciel"
      - text: "przyjaciel"
        want: "przy-ja-ciel"

  - section: "Kazakh"
    lang: "kaz"
    cases:
      # Standard Turkic V-CV / VC-CV rule: only one consonant moves to next syllable
      - text: "алма"
        want: "ал-ма"
      - text: "қала"
        want: "қа-ла"
      - text: "ағаш"
        want: "а-ғаш"
      - text: "тағам"
        want: "та-ғам"
      - text: "балық"
        want: "ба-лық"
      - text: "балалар"
        want: "ба-ла-лар"
      # 2-consonant cluster splits VC-CV
      - text: "мектеп"
        want: "мек-теп"
      - text: "сөздер"
        want: "сөз-дер"
      - text: "ұстаз"
        want: "ұс-таз"
      # Case preservation
      - text: "Алматы"
        want: "Ал-ма-ты"
      - text: "ҚАЛА"
        want: "ҚА-ЛА"
      # kaz-unique letters (ұ, ғ, і)
      - text: "мұғалім"
        want: "мұ-ға-лім"

  - section: "Kyrgyz"
    lang: "kir"
    cases:
      # Single consonant V-CV
      - text: "алма"
        want: "ал-ма"
      - text: "китеп"
        want: "ки-теп"
      - text: "кызыл"
        want: "кы-зыл"
      - text: "балык"
        want: "ба-лык"
      # 2-consonant cluster VC-CV
      - text: "жакшы"
        want: "жак-шы"
      # Long vowels (digraph) — never split; combined with normal CV rules
      - text: "буудай"
        want: "буу-дай"
      - text: "тоолуу"
        want: "тоо-луу"
      - text: "сүйлөшүү"
        want: "сүй-лө-шүү"
      # Single-syllable words
      - text: "тоо"
        want: "тоо"
      - text: "журт"
        want: "журт"
      # Uppercase preservation through long-vowel digraph
      - text: "ТООЛУУ"
        want: "ТОО-ЛУУ"
      # 2-consonant cluster VC-CV
      - text: "кыздар"
        want: "кыз-дар"

  - section: "Latvian"
    lang: "lav"
    cases:
      # Single consonant V-CV
      - text: "māte"
        want: "mā-te"
      - text: "māja"
        want: "mā-ja"
      - text: "uguns"
        want: "u-guns"
      - text: "Latvija"
        want: "Lat-vi-ja"
      # 2-consonant cluster VC-CV (no kept onset)
      - text: "tirgus"
        want: "tir-gus"
      - text: "balti"
        want: "bal-ti"
      # 2-consonant cluster — muta-cum-liquida kept (br)
      - text: "labrīt"
        want: "la-brīt"
      # Diphthongs as single nucleus
      - text: "lieli"
        want: "lie-li"
      - text: "paldies"
        want: "pal-dies"
      # Single-syllable words with diphthong / consonant cluster
      - text: "tēvs"
        want: "tēvs"
      - text: "miers"
        want: "miers"
      - text: "augs"
        want: "augs"
      - text: "draugs"
        want: "draugs"
      - text: "skaists"
        want: "skaists"
      # Latvian-unique cedilla letters
      - text: "ļoti"
        want: "ļo-ti"
      - text: "puķes"
        want: "pu-ķes"
      - text: "saņem"
        want: "sa-ņem"
      - text: "ģimene"
        want: "ģi-me-ne"
      # dz / dž affricates — single consonant, don't split between
      - text: "redzēt"
        want: "re-dzēt"
      - text: "daudz"
        want: "daudz"
      - text: "džemperis"
        want: "džem-pe-ris"

  - section: "Modern Greek"
    lang: "ell"
    cases:
      # Single consonant — V-CV
      - text: "καλημέρα"
        want: "κα-λη-μέ-ρα"
      - text: "αγάπη"
        want: "α-γά-πη"
      - text: "πατέρας"
        want: "πα-τέ-ρας"
      - text: "Αθήνα"
        want: "Α-θή-να"
      # Word-initial onset clusters stay with the first nucleus
      - text: "γνώμη"
        want: "γνώ-μη"
      - text: "μνήμη"
        want: "μνή-μη"
      - text: "σμήνος"
        want: "σμή-νος"
      # Mid-word 2-consonant cluster kept (valid onset βλ, στρ)
      - text: "βιβλίο"
        want: "βι-βλί-ο"
      # Mid-word 3-consonant cluster: longest valid onset wins
      - text: "άστρο"
        want: "ά-στρο"
      - text: "άνθρωπος"
        want: "άν-θρω-πος"
      # Mid-word cluster splits when not a valid onset (γράμμα also covers
      # initial γρ)
      - text: "γράμμα"
        want: "γράμ-μα"
      # Identical doubled consonants always split (λλ, σσ)
      - text: "ελληνικά"
        want: "ελ-λη-νι-κά"
      - text: "θάλασσα"
        want: "θά-λασ-σα"
      - text: "Έλληνας"
        want: "Έλ-λη-νας"
      # Standard VC-CV (no kept onset)
      - text: "πορτοκάλι"
        want: "πορ-το-κά-λι"
      # Vowel digraphs (diphthongs) — never split. αι/ει/οι/υι appear with
      # accents on the first vowel (άι etc.) as well as on the second.
      - text: "παιδί"
        want: "παι-δί"
      - text: "καιρός"
        want: "και-ρός"
      - text: "αυτός"
        want: "αυ-τός"
      - text: "τσάι"
        want: "τσάι"
      # Hiatus (adjacent vowels that don't form a diphthong) — split.
      # Orthographic policy: synizesis (modern phonetic merging of η/ι/υ
      # with a following vowel after a consonant) is NOT applied —
      # ά-γνοι-α (3 syllables), not the phonetic ά-γνοια.
      - text: "λαός"
        want: "λα-ός"
      - text: "αέρας"
        want: "α-έ-ρας"
      # Consonant digraphs treated as a single consonant (μπ, ντ, γγ, γκ,
      # τζ, τσ) — school orthographic convention
      - text: "μπαμπάς"
        want: "μπα-μπάς"
      - text: "άγγελος"
        want: "ά-γγε-λος"
      - text: "πάντα"
        want: "πά-ντα"
      - text: "γκρίζος"
        want: "γκρί-ζος"
      - text: "τζάμι"
        want: "τζά-μι"
      # Mid-word: consonant-digraph + consonant onset (γκρ, μπλ, ντρ)
      - text: "συγκρίνω"
        want: "συ-γκρί-νω"
      - text: "μπλε"
        want: "μπλε"
      - text: "ντροπή"
        want: "ντρο-πή"
      # Vowel-digraph accent variants and hiatus around them
      - text: "εικόνα"
        want: "ει-κό-να"
      - text: "βοήθεια"
        want: "βο-ή-θει-α"
      - text: "οικογένεια"
        want: "οι-κο-γέ-νει-α"

  - section: "Ancient Greek"
    lang: "grc"
    cases:
      # Polytonic accents (breathings + acute/grave/circumflex + iota
      # subscript) are handled by NFD normalisation + Mn auto-attach — no
      # enumeration in the rule needed.
      - text: "λόγος"
        want: "λό-γος"
      - text: "πατήρ"
        want: "πα-τήρ"
      - text: "ἀρχή"
        want: "ἀρ-χή"
      # Muta cum liquida / valid Greek onset clusters
      - text: "ἄνθρωπος"
        want: "ἄν-θρω-πος"
      - text: "βιβλίον"
        want: "βι-βλί-ον"
      - text: "διδάσκαλος"
        want: "δι-δά-σκα-λος"
      - text: "ἀδελφός"
        want: "ἀ-δελ-φός"
      # Initial cluster πν stays with the first nucleus + εῦ diphthong
      - text: "πνεῦμα"
        want: "πνεῦ-μα"
      # Diphthongs with breathing + accent on second vowel (εἰ)
      - text: "εἰρήνη"
        want: "εἰ-ρή-νη"
      # Iota subscript carried by NFD auto-attach (γλώσσῃ → 2 syll: ω+circ
      # carries the stressed nucleus, σσ splits, ῃ holds the dative ending)
      - text: "γλώσσῃ"
        want: "γλώσ-σῃ"
      # Diphthongs with breath/accent on the FIRST vowel: NFD places the
      # combining mark BETWEEN the two diphthong letters, so the tokenizer
      # has to skip marks while matching the digraph entry (Αἰγαῖος in
      # NFD: Α + ι + U+0313 + ... — αι base still matches).
      - text: "Αἰγαῖος"
        want: "Αἰ-γαῖ-ος"
      - text: "ἄνθρωποι"
        want: "ἄν-θρω-ποι"
      # Diaeresis on the second vowel of a candidate digraph signals
      # hiatus, not a diphthong. αϊ / Μαΐου must split.
      - text: "αϊτός"
        want: "α-ϊ-τός"
      - text: "Μαΐου"
        want: "Μα-ΐ-ου"

  - section: "Hungarian"
    lang: "hun"
    cases:
      # AkH 12 rule: only one consonant moves to the next syllable;
      # double digraphs are simplified in writing (ssz, ggy, nny, lly, tty,
      # ccs, zzs, ddz, ddzs) but the FULL form is restored on both sides
      # when split — see Sulinet (https://tudasbazis.sulinet.hu/hu/magyar-nyelv-es-irodalom/magyar-nyelv/nyelvtan-4-osztaly/toldalekos-szavak-elvalasztasa/kettozott-massalhangzot-tartalmazo-szavak-elvalasztasa)
      # and AkH 12 §226.

      # Single consonant — V-CV
      - text: "alma"
        want: "al-ma"
      - text: "lakás"
        want: "la-kás"
      - text: "három"
        want: "há-rom"
      - text: "repülőgép"
        want: "re-pü-lő-gép"

      # Digraphs as a single consonant
      - text: "magyar"
        want: "ma-gyar"
      - text: "gyerek"
        want: "gye-rek"
      - text: "konyha"
        want: "kony-ha"
      - text: "köszönöm"
        want: "kö-szö-nöm"

      # Two-consonant cluster — only one moves to the next syllable
      - text: "macska"
        want: "macs-ka"
      - text: "lámpa"
        want: "lám-pa"
      - text: "ablak"
        want: "ab-lak"
      - text: "asztal"
        want: "asz-tal"
      - text: "ország"
        want: "or-szág"
      - text: "ember"
        want: "em-ber"
      - text: "iskola"
        want: "is-ko-la"
      - text: "egyenlő"
        want: "e-gyen-lő"
      - text: "játszik"
        want: "ját-szik"

      # Initial three-consonant cluster, mid-word boundary splits
      - text: "struktúra"
        want: "struk-tú-ra"

      # Simple geminate consonants — split between
      - text: "kettő"
        want: "ket-tő"
      - text: "vállal"
        want: "vál-lal"

      # Geminate digraphs — written short (ssz/ggy/nny/...) but restored
      # to full form (sz-sz, gy-gy, ny-ny, ...) at the split
      - text: "asszony"
        want: "asz-szony"
      - text: "mennyi"
        want: "meny-nyi"
      - text: "vissza"
        want: "visz-sza"
      - text: "poggyász"
        want: "pogy-gyász"

      # Single-syllable words — no split, geminate digraph NOT expanded
      - text: "egy"
        want: "egy"
      - text: "nyolc"
        want: "nyolc"
      - text: "fütty"
        want: "fütty"

      # Case preservation
      - text: "Asszony"
        want: "Asz-szony"
      - text: "MAGYAR"
        want: "MA-GYAR"
      # All-caps geminate digraph: full uppercase must be preserved through
      # the expansion/render pipeline
      - text: "ASSZONY"
        want: "ASZ-SZONY"
      - text: "POGGYÁSZ"
        want: "POGY-GYÁSZ"
      - text: "MENNYI"
        want: "MENY-NYI"
      # Boundary OUTSIDE the geminate: the expanded form must NOT leak —
      # "fütty" stays compact, only the morpheme boundary shows
      - text: "füttyben"
        want: "fütty-ben"
      # Boundary inside the geminate AND a separate suffix boundary
      - text: "asszonyban"
        want: "asz-szony-ban"

  # Finnish (fin). Standard orthographic syllabification per VISK and
  # Karlsson — strict VC-CV with long vowels and diphthongs as nuclei.
  - section: "Finnish"
    lang: "fin"
    cases:
      # V-CV: one intervocalic consonant
      - text: "kala"
        want: "ka-la"
      - text: "talo"
        want: "ta-lo"
      - text: "ranta"
        want: "ran-ta"

      # VC-CV: only the last consonant of a cluster moves to the next onset
      - text: "kissa"
        want: "kis-sa"
      - text: "matka"
        want: "mat-ka"
      - text: "Helsinki"
        want: "Hel-sin-ki"
      - text: "kahvi"
        want: "kah-vi"
      - text: "ystävä"
        want: "ys-tä-vä"
      - text: "mahdollisuus"
        want: "mah-dol-li-suus"

      # Long vowels — one nucleus, never split
      - text: "maa"
        want: "maa"
      - text: "puu"
        want: "puu"
      - text: "kuusi"
        want: "kuu-si"
      - text: "kääntää"
        want: "kään-tää"
      - text: "saari"
        want: "saa-ri"

      # i-diphthongs (universal)
      - text: "aikuinen"
        want: "ai-kui-nen"
      - text: "perjantai"
        want: "per-jan-tai"

      # u-diphthongs
      - text: "koulu"
        want: "kou-lu"
      - text: "aurinko"
        want: "au-rin-ko"
      - text: "kaupunki"
        want: "kau-pun-ki"
      - text: "rakkaus"
        want: "rak-kaus"

      # Opening diphthongs (ie/uo/yö) — first-syllable canonical examples
      - text: "suomi"
        want: "suo-mi"
      - text: "kieli"
        want: "kie-li"
      - text: "huone"
        want: "huo-ne"
      - text: "tie"
        want: "tie"
      - text: "työ"
        want: "työ"
      - text: "syö"
        want: "syö"
      - text: "miehet"
        want: "mie-het"

      # Hiatus — vowel sequences that are not a recognised digraph split.
      # The tokenizer is greedy on digraphs, so we pin down the cases
      # where no digraph applies and adjacent monophthongs must split.
      - text: "yliopisto"
        want: "y-li-o-pis-to"
      - text: "hioa"
        want: "hi-o-a"
      # `uo` IS a recognised opening diphthong, but the trailing `a`
      # cannot join it — the `a` forms its own syllable via hiatus.
      - text: "ruoan"
        want: "ruo-an"

  # Dutch (nld). Standard orthographic syllabification per Het Groene
  # Boekje, with hyphenations cross-checked against nl.wiktionary.org.
  - section: "Dutch"
    lang: "nld"
    cases:
      # V-CV: one intervocalic consonant
      - text: "maken"
        want: "ma-ken"
      - text: "lopen"
        want: "lo-pen"
      - text: "boven"
        want: "bo-ven"
      - text: "water"
        want: "wa-ter"
      - text: "vader"
        want: "va-der"
      - text: "tafel"
        want: "ta-fel"
      - text: "moeder"
        want: "moe-der"

      # VC-CV: two intervocalic consonants split (strict)
      - text: "kinderen"
        want: "kin-de-ren"
      - text: "boekje"
        want: "boek-je"
      - text: "kasteel"
        want: "kas-teel"
      - text: "meester"
        want: "mees-ter"
      - text: "pistool"
        want: "pis-tool"
      - text: "katje"
        want: "kat-je"

      # Muta-cum-liquida (stop + r/l) stays together in 2-cons clusters
      - text: "patroon"
        want: "pa-troon"
      - text: "atrium"
        want: "a-tri-um"
      - text: "vragen"
        want: "vra-gen"

      # 3-cons clusters: at least one consonant stays prev, trailing
      # 2/3 cons go next when they form a valid onset
      - text: "venster"
        want: "ven-ster"
      - text: "monster"
        want: "mon-ster"
      - text: "hamster"
        want: "ham-ster"
      - text: "centrum"
        want: "cen-trum"
      - text: "industrie"
        want: "in-dus-trie"
      - text: "destructie"
        want: "des-truc-tie"

      # ch is a single phoneme /x/
      - text: "lachen"
        want: "la-chen"
      - text: "bochel"
        want: "bo-chel"
      - text: "lichten"
        want: "lich-ten"

      # Initial sch- (3-letter cluster) — handled automatically at word
      # start as everything before the first nucleus
      - text: "schaduw"
        want: "scha-duw"
      - text: "schaal"
        want: "schaal"

      # Long vowels and diphthongs as single nuclei
      - text: "vrouwen"
        want: "vrou-wen"
      - text: "huizen"
        want: "hui-zen"
      - text: "rijden"
        want: "rij-den"

      # Triphthongs aai/ooi/oei/eeu/ieu are single nuclei
      - text: "moeite"
        want: "moei-te"
      - text: "mooie"
        want: "mooi-e"
      - text: "draaien"
        want: "draai-en"
      - text: "leeuwen"
        want: "leeu-wen"
      - text: "nieuwe"
        want: "nieu-we"

      # Multi-syllable words with several internal clusters
      - text: "Nederland"
        want: "Ne-der-land"
      - text: "Amsterdam"
        want: "Am-ster-dam"
      - text: "paddenstoel"
        want: "pad-den-stoel"

      # Hiatus marked by diaeresis (combining U+0308 attaches and the
      # diaeresis-veto blocks digraph absorption)
      - text: "ideeën"
        want: "i-dee-ën"
      - text: "patiënt"
        want: "pa-ti-ënt"

  # Swedish (swe). Enkonsonantsprincipen — one consonant moves to the
  # next syllable. Cross-referenced against sv.wiktionary.org.
  - section: "Swedish"
    lang: "swe"
    cases:
      # V-CV: one intervocalic consonant
      - text: "skola"
        want: "sko-la"
      - text: "läsa"
        want: "lä-sa"
      - text: "röka"
        want: "rö-ka"
      - text: "Sverige"
        want: "Sve-ri-ge"
      - text: "tjugo"
        want: "tju-go"

      # VC-CV with geminate consonants
      - text: "kvinna"
        want: "kvin-na"
      - text: "bygga"
        want: "byg-ga"
      - text: "känna"
        want: "kän-na"

      # VC-CV with other 2-cons clusters
      - text: "pojke"
        want: "poj-ke"
      - text: "arbeta"
        want: "ar-be-ta"
      - text: "familjen"
        want: "fa-mil-jen"
      - text: "fiska"
        want: "fis-ka"

      # ck is the geminate of k; strict VC-CV gives vac-ker (SAOL also
      # accepts vack-er via ordledsprincipen)
      - text: "vacker"
        want: "vac-ker"

      # Multi-syllable with VC-CV throughout (människa confirmed by
      # sv.wiktionary.org as män·nis·ka)
      - text: "människa"
        want: "män-nis-ka"
      - text: "Helsingfors"
        want: "Hel-sing-fors"

      # Single-syllable words — no split
      - text: "bok"
        want: "bok"
      - text: "sju"
        want: "sju"
      - text: "sjö"
        want: "sjö"
      - text: "röd"
        want: "röd"

  - section: "Latin"
    lang: "lat"
    cases:
      - text: "salve"
        want: "sal-ve"
      - text: "aqua"
        want: "a-qua"
      - text: "poeta"
        want: "poe-ta"
      - text: "caesar"
        want: "cae-sar"
      - text: "philosophia"
        want: "phi-lo-so-phi-a"
      - text: "terra"
        want: "ter-ra"
      - text: "stella"
        want: "stel-la"
      - text: "magnus"
        want: "mag-nus"
      - text: "scripta"
        want: "scrip-ta"
      - text: "augustus"
        want: "au-gus-tus"
      - text: "castle"
        want: "cast-le"
