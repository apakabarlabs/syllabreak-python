  - section: "Polish"
    lang: "pol"
    cases:
      - text: "cześć"
        want: "cześć"
      - text: "dzień"
        want: "dzień"
      - text: "dobry"
        want: "do-bry"
      - text: "polska"
        want: "pol-ska"
