  - section: "Georgian"
    lang: "kat"
    cases:
      - text: "გამარჯობა"
        want: "გა-მარ-ჯო-ბა"
      - text: "ქალაქი"
        want: "ქა-ლა-ქი"
      - text: "საქართველო"
        want: "სა-ქარ-თვე-ლო"
      - text: "მშვენიერი"
        want: "მშვე-ნი-ე-რი"
      - text: "თბილისი"
        want: "თბი-ლი-სი"

  # Eastern Armenian (hye). School orthographic syllabification per
  # Univ. College Oxford notes on classical Armenian (still followed for
  # modern), Dum-Tragut "Armenian: Modern Eastern Armenian" §1.4, and
  # Sahak Petrosyan's hyph-hy.tex (TeX hyphenation patterns, MIT 2010):
  #
  #   - one syllable per written vowel (no schwa epenthesis — the
  #     pronounced schwa in dpros etc. is not orthographic)
  #   - V-CV for a single intervocalic consonant
  #   - VC-CV for two consonants ("Word-internally, -CC- is perceived as
  #     a natural syllable boundary")
  #   - ու is a single nucleus
  #   - և (yev ligature) counted as one vowel-bearing letter
  - section: "Armenian"
    lang: "hye"
    cases:
      # V-CV throughout; ու is one nucleus
      - text: "ուսանող"
        want: "ու-սա-նող"
      - text: "լեզու"
        want: "լե-զու"
      - text: "ուրախ"
        want: "ու-րախ"
      - text: "երեխա"
        want: "ե-րե-խա"
      - text: "հեռախոս"
        want: "հե-ռա-խոս"
      - text: "խաղող"
        want: "խա-ղող"

      # VC-CV — internal CC splits, no muta-cum-liquida
      - text: "ընկեր"
        want: "ըն-կեր"
      - text: "ակնարկ"
        want: "ակ-նարկ"
      - text: "հայրենիք"
        want: "հայ-րե-նիք"
      - text: "սենյակ"
        want: "սեն-յակ"
      - text: "մայրաքաղաք"
        want: "մայ-րա-քա-ղաք"

      # Final consonant cluster stays with the last nucleus
      - text: "աշակերտ"
        want: "ա-շա-կերտ"

      # Single graphic vowel — no orthographic split even though the word
      # is pronounced with epenthetic schwas (dpros = [də.pə.rɔts]).
      # We do not insert schwa, so the result is one syllable.
      - text: "դպրոց"
        want: "դպրոց"
      - text: "գիրք"
        want: "գիրք"
      - text: "հայ"
        want: "հայ"
      - text: "մայր"
        want: "մայր"
      - text: "հաց"
        want: "հաց"

      # ու digraph in non-initial position and across syllables
      - text: "ընկերուհի"
        want: "ըն-կե-րու-հի"
      # -CC- splits even when the second consonant is the glide յ: the
      # Oxford rule treats every internal cluster as a natural boundary,
      # and յ has no special onset privilege (cf. սենյակ → սեն-յակ).
      - text: "գիտություն"
        want: "գի-տութ-յուն"

      # և ligature treated as a vowel (single nucleus, /jɛv/)
      - text: "արև"
        want: "ա-րև"
      - text: "նաև"
        want: "նա-և"
      # Uppercase non-ligature equivalent: ԵՎ is the conventional
      # all-caps spelling of և (the lowercase ligature has no precomposed
      # uppercase form). It must syllabify correctly via V-CV as plain
      # ե + վ, with no special digraph handling.
      - text: "ԱՐԵՎ"
        want: "Ա-ՐԵՎ"

      # Case preservation
      - text: "Հայաստան"
        want: "Հա-յաս-տան"
      - text: "Հայ"
        want: "Հայ"
      - text: "ՈՒՍԱՆՈՂ"
        want: "ՈՒ-ՍԱ-ՆՈՂ"

  - section: "German"
    lang: "deu"
    cases:
      - text: "hallo"
        want: "hal-lo"
      - text: "welt"
        want: "welt"
      - text: "schön"
        want: "schön"
      - text: "deutschland"
        want: "deutsch-land"
      - text: "zusammen"
        want: "zu-sam-men"
      - text: "arbeit"
        want: "ar-beit"
      - text: "geschäft"
        want: "ge-schäft"
      - text: "übung"
        want: "ü-bung"
      - text: "straße"
        want: "stra-ße"
      - text: "fußball"
        want: "fuß-ball"
      - text: "mädchen"
        want: "mäd-chen"
      - text: "österreich"
        want: "ös-ter-reich"
      - text: "schmetterling"
        want: "schmet-ter-ling"
      - text: "kinder"
        want: "kin-der"
      - text: "spielen"
        want: "spie-len"
      - text: "frühstück"
        want: "früh-stück"
      # Locks the 2-letter onset behaviour after 3-letter onset support
      # landed in the engine: Duden splits mid-word "str" as VC-CCV
      # (As-tro-no-mie), not as V-CCCV (A-stro-no-mie). The deu rule
      # therefore lists "tr" but not "str" in clusters_keep_next.
      - text: "Astronomie"
        want: "As-tro-no-mie"

  - section: "French"
    lang: "fra"
    cases:
      - text: "bonjour"
        want: "bon-jour"
      - text: "merci"
        want: "mer-ci"
      - text: "français"
        want: "fran-çais"
      - text: "château"
        want: "châ-teau"
      - text: "beautiful"
        want: "beau-ti-ful"
      - text: "papillon"
        want: "pa-pil-lon"
      - text: "ordinateur"
        want: "or-di-na-teur"
      - text: "électricité"
        want: "é-lec-tri-ci-té"
      - text: "œuvre"
        want: "œu-vre"
      - text: "magnifique"
        want: "ma-gni-fi-que"

  - section: "Romanian"
    lang: "ron"
    cases:
      # Basic words
      - text: "bună"
        want: "bu-nă"
      - text: "carte"
        want: "car-te"
      - text: "seară"
        want: "sea-ră"
      - text: "lucru"
        want: "lu-cru"
      # Final -i as semivowel (palatalization) - does NOT form separate syllable
      - text: "București"
        want: "Bu-cu-rești"
      - text: "studenți"
        want: "stu-denți"
      - text: "părinți"
        want: "pă-rinți"
      - text: "frați"
        want: "frați"
      # But final -i after vowel IS a syllable
      - text: "prieteni"
        want: "pri-e-teni"
      - text: "oameni"
        want: "oa-meni"
      # Clusters sp/st/sc split between vowels (DOOM norm)
      - text: "răspuns"
        want: "răs-puns"
      - text: "dragoste"
        want: "dra-gos-te"
      # Other words
      - text: "copil"
        want: "co-pil"
      - text: "bine"
        want: "bi-ne"
      - text: "iubire"
        want: "iu-bi-re"
      - text: "fericire"
        want: "fe-ri-ci-re"
      - text: "speranță"
        want: "spe-ran-ță"
      - text: "sănătate"
        want: "să-nă-ta-te"
      - text: "libertate"
        want: "li-ber-ta-te"

