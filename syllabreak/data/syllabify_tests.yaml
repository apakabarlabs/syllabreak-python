  - section: "Polish"
    lang: "pol"
    cases:
      - text: "cześć"
        want: "cześć"
      - text: "dzień"
        want: "dzień"
      - text: "dobry"
        want: "do-bry"
      - text: "polska"
        want: "pol-ska"
      - text: "warszawa"
        want: "war-sza-wa"
      - text: "przepraszam"
        want: "prze-pra-szam"
      - text: "dziękuję"
        want: "dzię-ku-ję"
      - text: "książka"
        want: "książ-ka"
      - text: "nauczyciel"
        want: "nau-czy-ciel"
      - text: "przyjaciel"
        want: "przy-ja-ciel"

  - section: "Kazakh"
    lang: "kaz"
    cases:
      # Standard Turkic V-CV / VC-CV rule: only one consonant moves to next syllable
      - text: "алма"
        want: "ал-ма"
      - text: "қала"
        want: "қа-ла"
      - text: "ағаш"
        want: "а-ғаш"
      - text: "тағам"
        want: "та-ғам"
      - text: "балық"
        want: "ба-лық"
      - text: "балалар"
        want: "ба-ла-лар"
      # 2-consonant cluster splits VC-CV
      - text: "мектеп"
        want: "мек-теп"
      - text: "сөздер"
        want: "сөз-дер"
      - text: "ұстаз"
        want: "ұс-таз"
      # Case preservation
      - text: "Алматы"
        want: "Ал-ма-ты"

  - section: "Kyrgyz"
    lang: "kir"
    cases:
      # Single consonant V-CV
      - text: "алма"
        want: "ал-ма"
      - text: "китеп"
        want: "ки-теп"
      - text: "кызыл"
        want: "кы-зыл"
      - text: "балык"
        want: "ба-лык"
      # 2-consonant cluster VC-CV
      - text: "жакшы"
        want: "жак-шы"
      # Long vowels (digraph) — never split; combined with normal CV rules
      - text: "буудай"
        want: "буу-дай"
      - text: "тоолуу"
        want: "тоо-луу"
      - text: "сүйлөшүү"
        want: "сүй-лө-шүү"
      # Single-syllable words
      - text: "тоо"
        want: "тоо"
      - text: "журт"
        want: "журт"

  - section: "Latvian"
    lang: "lav"
    cases:
      # Single consonant V-CV
      - text: "māte"
        want: "mā-te"
      - text: "māja"
        want: "mā-ja"
      - text: "uguns"
        want: "u-guns"
      - text: "Latvija"
        want: "Lat-vi-ja"
      # 2-consonant cluster VC-CV (no kept onset)
      - text: "tirgus"
        want: "tir-gus"
      - text: "balti"
        want: "bal-ti"
      # 2-consonant cluster — muta-cum-liquida kept (br)
      - text: "labrīt"
        want: "la-brīt"
      # Diphthongs as single nucleus
      - text: "lieli"
        want: "lie-li"
      - text: "paldies"
        want: "pal-dies"
      # Single-syllable words with diphthong / consonant cluster
      - text: "tēvs"
        want: "tēvs"
      - text: "miers"
        want: "miers"
      - text: "augs"
        want: "augs"
      - text: "draugs"
        want: "draugs"
      - text: "skaists"
        want: "skaists"

  - section: "Hungarian"
    lang: "hun"
    cases:
      # AkH 12 rule: only one consonant moves to the next syllable;
      # double digraphs are simplified in writing (ssz, ggy, nny, lly, tty,
      # ccs, zzs, ddz, ddzs) but the FULL form is restored on both sides
      # when split — see Sulinet (https://tudasbazis.sulinet.hu/hu/magyar-nyelv-es-irodalom/magyar-nyelv/nyelvtan-4-osztaly/toldalekos-szavak-elvalasztasa/kettozott-massalhangzot-tartalmazo-szavak-elvalasztasa)
      # and AkH 12 §226.

      # Single consonant — V-CV
      - text: "alma"
        want: "al-ma"
      - text: "lakás"
        want: "la-kás"
      - text: "három"
        want: "há-rom"
      - text: "repülőgép"
        want: "re-pü-lő-gép"

      # Digraphs as a single consonant
      - text: "magyar"
        want: "ma-gyar"
      - text: "gyerek"
        want: "gye-rek"
      - text: "konyha"
        want: "kony-ha"
      - text: "köszönöm"
        want: "kö-szö-nöm"

      # Two-consonant cluster — only one moves to the next syllable
      - text: "macska"
        want: "macs-ka"
      - text: "lámpa"
        want: "lám-pa"
      - text: "ablak"
        want: "ab-lak"
      - text: "asztal"
        want: "asz-tal"
      - text: "ország"
        want: "or-szág"
      - text: "ember"
        want: "em-ber"
      - text: "iskola"
        want: "is-ko-la"
      - text: "egyenlő"
        want: "e-gyen-lő"
      - text: "játszik"
        want: "ját-szik"

      # Initial three-consonant cluster, mid-word boundary splits
      - text: "struktúra"
        want: "struk-tú-ra"

      # Simple geminate consonants — split between
      - text: "kettő"
        want: "ket-tő"
      - text: "vállal"
        want: "vál-lal"

      # Geminate digraphs — written short (ssz/ggy/nny/...) but restored
      # to full form (sz-sz, gy-gy, ny-ny, ...) at the split
      - text: "asszony"
        want: "asz-szony"
      - text: "mennyi"
        want: "meny-nyi"
      - text: "vissza"
        want: "visz-sza"
      - text: "poggyász"
        want: "pogy-gyász"

      # Single-syllable words — no split, geminate digraph NOT expanded
      - text: "egy"
        want: "egy"
      - text: "nyolc"
        want: "nyolc"
      - text: "fütty"
        want: "fütty"

      # Case preservation
      - text: "Asszony"
        want: "Asz-szony"
      - text: "MAGYAR"
        want: "MA-GYAR"
      # All-caps geminate digraph: full uppercase must be preserved through
      # the expansion/render pipeline
      - text: "ASSZONY"
        want: "ASZ-SZONY"
      - text: "POGGYÁSZ"
        want: "POGY-GYÁSZ"
      - text: "MENNYI"
        want: "MENY-NYI"
      # Boundary OUTSIDE the geminate: the expanded form must NOT leak —
      # "fütty" stays compact, only the morpheme boundary shows
      - text: "füttyben"
        want: "fütty-ben"
      # Boundary inside the geminate AND a separate suffix boundary
      - text: "asszonyban"
        want: "asz-szony-ban"

  - section: "Latin"
    lang: "lat"
    cases:
      - text: "salve"
