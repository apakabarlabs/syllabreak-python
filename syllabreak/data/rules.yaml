rules:
  - lang: "eng"
    vowels: "aeiouy"
    consonants: "bcdfghjklmnpqrstvwxyz"
    sonorants: "lmnr"
    clusters_keep_next: ["bl", "br", "cl", "cr", "dr", "fl", "fr", "gl", "gr", "pl", "pr", "sl", "sm", "sn", "sp", "st", "sw", "tr", "tw"]
    dont_split_digraphs: ["ch", "sh", "th", "ph", "wh", "ck", "gh", "qu"]
    digraph_vowels: ["ea", "ee", "oo", "ou", "ie", "ei", "ai", "ay", "oy", "oi", "ue"]
    glides: "wy"
    syllabic_consonants: ""
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""
    # Word-final sequences that should not be split (care, here, more, cure, fire)
    # These are kept together at word end or before light suffixes (-s, -less, -ful, -ly, -ing, -ed)
    final_sequences_keep: ["are", "ere", "ire", "ore", "ure"]
    # Suffixes that break V-r-e pattern (parent -> par-ent, adherent -> ad-her-ent)
    suffixes_break_vre: ["ent", "ents", "ence", "ency", "ment", "ments"]
    # Light suffixes that don't break V-r-e pattern (care-less, care-ful)
    suffixes_keep_vre: ["s", "ed", "ing", "less", "ful", "fully", "ly", "ness"]

  - lang: "rus"
    vowels: "аеёиоуыэюя"
    consonants: "бвгджзйклмнпрстфхцчшщ"
    sonorants: "лмнрй"
    clusters_keep_next: ["бл", "бр", "кл", "кр", "др", "тр", "пл", "пр", "сл", "см", "сн", "сп", "ст", "ск", "фл", "фр", "гр", "гл"]
    dont_split_digraphs: []
    digraph_vowels: ["ье", "ья", "ьё", "ьи"]
    glides: "й"
    syllabic_consonants: ""
    modifiers_attach_left: "ь"
    modifiers_attach_right: ""
    modifiers_separators: "ъ"

  - lang: "srp-cyrl"
    vowels: "аиуео"
    consonants: "бвгдђжзјклљмнњпрстћфхцчџш"
    sonorants: "лљмнњрј"
    clusters_keep_next: ["бр", "кр", "др", "тр", "пр", "гр", "гл", "пл", "кл", "сп", "ст", "ск"]
    dont_split_digraphs: []
    digraph_vowels: []
    glides: "ј"
    syllabic_consonants: "р"
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""

  - lang: "srp-latn"
    vowels: "aeiou"
    consonants: "bcčćdžđfghjklmnprsštvzž"
    sonorants: "lmnrj"
    clusters_keep_next: ["br", "kr", "dr", "tr", "pr", "gr", "gl", "pl", "kl", "sp", "st", "sk"]
    dont_split_digraphs: ["nj", "lj", "dž", "dj"]
    digraph_vowels: []
    glides: "j"
    syllabic_consonants: "r"
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""

  # Kazakh — Cyrillic alphabet with Turkic extras (ә, і, ң, ө, ұ, ү, ғ, қ, һ).
  # Standard Turkic syllabification: only one consonant moves to the next
  # syllable, so clusters_keep_next is empty. Three-consonant clusters fall
  # apart 2|1 by the default long-cluster rule (boundary before the last
  # consonant).
  #
  # Loanwords and proper names with foreign onset clusters (Қазақстан →
  # Қа-зақ-стан, галстук → гал-стук) require lexical knowledge to split
  # the normative way. Keeping a rule-based "no dictionary" stance we let
  # them fall through the native algorithm (Қа-зақс-тан, галс-тук) at the
  # cost of being incorrect on those specific words. Adding ст/сп/ск to
  # clusters_keep_next would fix the loanwords but break native words like
  # ұс-таз (would become ұ-стаз), which is worse.
  - lang: "kaz"
    vowels: "аәеёиоөуұүыіэюя"
    consonants: "бвгғджзйкқлмнңпрстфхһцчшщ"
    sonorants: "лмнңрй"
    clusters_keep_next: []
    dont_split_digraphs: []
    digraph_vowels: []
    glides: "й"
    syllabic_consonants: ""
    modifiers_attach_left: "ь"
    modifiers_attach_right: ""
    modifiers_separators: "ъ"

  # Kyrgyz — Cyrillic alphabet with Turkic extras (ң, ө, ү). Long vowels
  # (аа, ээ, оо, ии, уу, өө, үү) form a single nucleus and never split:
  # буу-дай, not бу-удай; тоо-луу, not то-олуу.
  #
  # Same loanword caveat as Kazakh: Кыргызстан → Кыр-гызс-тан under the
  # native algorithm rather than the normative Кыр-гыз-стан, because that
  # would require lexical knowledge.
  #
  # Auto-detect: a Kyrgyz sample built only from Cyrillic letters that also
  # appear in Russian will be detected as `rus` (it comes first in the
  # rules file). A sample containing ң/ө/ү will be detected as `kaz`, since
  # Kazakh's alphabet is a superset of Kyrgyz's. Either way, callers
  # wanting Kyrgyz handling should pass lang="kir" explicitly.
  - lang: "kir"
    vowels: "аеёиоөуүыэюя"
    consonants: "бвгджзйклмнңпрстфхцчшщ"
    sonorants: "лмнңрй"
    clusters_keep_next: []
    dont_split_digraphs: []
    digraph_vowels: ["аа", "ээ", "оо", "ии", "уу", "өө", "үү"]
    glides: "й"
    syllabic_consonants: ""
    modifiers_attach_left: "ь"
    modifiers_attach_right: ""
    modifiers_separators: "ъ"

  - lang: "tur"
    vowels: "aeıioöuü"
    consonants: "bcçdfgğhjklmnprsştvyz"
    sonorants: "lmnr"
    clusters_keep_next: ["br", "bl", "kr", "kl", "pr", "pl", "tr", "dr", "fr", "fl", "gr", "gl"]  # rare in native words, mostly in loanwords
    dont_split_digraphs: []  # Turkish orthography doesn't use digraphs
    digraph_vowels: []       # No vowel digraphs in Turkish
    glides: "y"
    syllabic_consonants: ""  # Turkish doesn't have syllabic consonants
    modifiers_attach_left: ""  # No diacritic markers as separate letters
    modifiers_attach_right: ""
    modifiers_separators: ""

  # Modern Greek (ell). School orthographic syllabification:
  #   - one vowel/diphthong per syllable
  #   - a single consonant goes with the following vowel (V-CV)
  #   - two/three consonants stay with the following vowel only if they
  #     form a valid Greek word-initial onset (βιβλίο → βι-βλίο because
  #     βλ- is a valid onset; ά-στρο because στρ- is too). Otherwise the
  #     cluster splits VC-CV / VCC-CV (πορ-το-κά-λι, άν-θρω-πος).
  #   - identical doubled consonants always split (ελ-λη-νι-κά, θά-λασ-σα,
  #     γράμ-μα)
  #   - vowel digraphs αι, ει, οι, υι, αυ, ευ, ηυ, ου (with all accent
  #     positions) are a single nucleus
  #   - consonant digraphs μπ, ντ, γκ, γγ, τζ, τσ are a single consonant
  #     (school orthographic convention — phonetically μπ/ντ/γκ are
  #     sometimes two consonants mid-word, but the spelling rule treats
  #     them as one)
  #   - adjacent vowels not forming a digraph are hiatus and split
  #     (λα-ός, βι-βλί-ο). Modern phonetic synizesis (η/ι/υ + V coalescing
  #     after a consonant in unaccented positions, e.g. ά-γνοια as 2 syll)
  #     is NOT applied — the orthographic 3-syllable ά-γνοι-α is produced.
  - lang: "ell"
    vowels: "αεηιουωϊϋΐΰάέήίόύώ"
    consonants: "βγδζθκλμνξπρστφχψς"
    sonorants: "λμνρ"
    clusters_keep_next: [
      "βλ", "βρ",
      "γλ", "γν", "γρ",
      "δρ",
      "θλ", "θν", "θρ",
      "κλ", "κν", "κρ", "κτ",
      "μν",
      "πλ", "πν", "πρ", "πτ",
      "σβ", "σγ", "σθ", "σκ", "σλ", "σμ", "σν", "σπ", "στ", "σφ", "σχ",
      "τλ", "τμ", "τρ",
      "φθ", "φλ", "φρ", "φτ",
      "χθ", "χλ", "χν", "χρ", "χτ",
      # 3-letter onsets
      "σπρ", "στρ", "σκρ",
      # Consonant-digraph + consonant. μπ/ντ/γκ tokenise as one consonant,
      # so a cluster like [γκ, ρ] is checked as the 3-character onset "γκρ"
      # in συ-γκρί-νω; μπλε / ντροπή work too.
      "γκλ", "γκρ", "μπλ", "μπρ", "ντρ"
    ]
    dont_split_digraphs: ["μπ", "ντ", "γκ", "γγ", "τζ", "τσ"]
    digraph_vowels: [
      "αι", "ει", "οι", "υι", "αυ", "ευ", "ηυ", "ου",
      "αί", "εί", "οί", "υί", "αύ", "εύ", "ηύ", "ού",
      "άι", "έι", "όι", "ύι"
    ]
    glides: ""
    syllabic_consonants: ""
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""
    split_hiatus: true

  # Ancient (Classical) Greek (grc).
  #
  # Two responsibilities, two sources of truth:
  #
  #   - Tokenisation only needs base letters. The engine NFD-normalises
  #     input before tokenisation and the tokenizer auto-attaches every
  #     combining mark to the preceding token, so polytonic accents
  #     (smooth/rough breathing, acute/grave/circumflex, iota subscript,
  #     diaeresis) ride along automatically.
  #
  #   - Detection works on NFC input through each rule's character set.
  #     The vowel and consonant lists below enumerate every precomposed
  #     codepoint in the Greek and Greek Extended Unicode blocks whose
  #     base letter is a Greek vowel / consonant — generated from
  #     unicodedata, not hand-written. Precomposed polytonic forms like
  #     ἀ, ἄ, ἤ live only in this rule, which is what discriminates grc
  #     from monotonic ell at detection time.
  #
  # Differences from Modern Greek: no consonant digraphs μπ/ντ/γκ/γγ/τζ/τσ
  # — in Classical Greek these were two separate consonants.
  - lang: "grc"
    vowels: "ΐάέήίΰαεηιουωϊϋόύώἀἁἂἃἄἅἆἇἐἑἒἓἔἕἠἡἢἣἤἥἦἧἰἱἲἳἴἵἶἷὀὁὂὃὄὅὐὑὒὓὔὕὖὗὠὡὢὣὤὥὦὧὰάὲέὴήὶίὸόὺύὼώᾀᾁᾂᾃᾄᾅᾆᾇᾐᾑᾒᾓᾔᾕᾖᾗᾠᾡᾢᾣᾤᾥᾦᾧᾰᾱᾲᾳᾴᾶᾷιῂῃῄῆῇῐῑῒΐῖῗῠῡῢΰῦῧῲῳῴῶῷΆΈΉΊΌΎΏΑΕΗΙΟΥΩΪΫἈἉἊἋἌἍἎἏἘἙἚἛἜἝἨἩἪἫἬἭἮἯἸἹἺἻἼἽἾἿὈὉὊὋὌὍὙὛὝὟὨὩὪὫὬὭὮὯᾈᾉᾊᾋᾌᾍᾎᾏᾘᾙᾚᾛᾜᾝᾞᾟᾨᾩᾪᾫᾬᾭᾮᾯᾸᾹᾺΆᾼῈΈῊΉῌῘῙῚΊῨῩῪΎῸΌῺΏῼ"
    consonants: "ΒΓΔΖΘΚΛΜΝΞΠΡΣΤΦΧΨβγδζθκλμνξπρςστφχψϴῤῥῬ"
    sonorants: "λμνρ"
    clusters_keep_next: [
      "βλ", "βρ",
      "γλ", "γν", "γρ",
      "δρ",
      "θλ", "θν", "θρ",
      "κλ", "κν", "κρ", "κτ",
      "μν",
      "πλ", "πν", "πρ", "πτ",
      "σβ", "σθ", "σκ", "σμ", "σπ", "στ", "σφ", "σχ",
      "τλ", "τμ", "τρ",
      "φθ", "φλ", "φρ",
      "χθ", "χλ", "χν", "χρ",
      "στρ", "σπρ", "σκρ"
    ]
    dont_split_digraphs: []
    digraph_vowels: ["αι", "ει", "οι", "υι", "αυ", "ευ", "ηυ", "ου"]
    glides: ""
    syllabic_consonants: ""
    # Combining marks aren't listed here: the tokenizer auto-attaches any
    # Unicode Mn-category codepoint to the preceding token, which covers
    # smooth/rough breathing, acute/grave/circumflex, iota subscript and
    # diaeresis without enumeration.
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""
    split_hiatus: true

  # Hungarian (AkH 12 §226). Key rules encoded here:
  #
  #   1. Only one consonant moves to the next syllable, regardless of which
  #      cluster it forms. So clusters_keep_next is empty — "ablak" splits
  #      as "ab-lak", not "a-blak"; "macska" as "macs-ka"; "asztal" as
  #      "asz-tal".
  #   2. cs, dz, dzs, gy, ly, ny, sz, ty, zs are single consonants and
  #      cannot be split.
  #   3. Geminate digraphs are written in a simplified form
  #      (ssz=sz+sz, ggy=gy+gy, nny, lly, tty, ccs, zzs, ddz, ddzs) but
  #      restored in FULL on both sides of a line break:
  #      asz-szony, meny-nyi, ösz-sze, pogy-gyász. Encoded as
  #      geminate_digraphs and pre-expanded by LanguageRule before
  #      tokenisation.
  - lang: "hun"
    vowels: "aeiouáéíóöőúüű"
    consonants: "bcdfghjklmnpqrstvwxyz"
    sonorants: "lmnrj"
    clusters_keep_next: []
    dont_split_digraphs: ["dzs", "cs", "dz", "gy", "ly", "ny", "sz", "ty", "zs"]
    digraph_vowels: []
    glides: "j"
    syllabic_consonants: ""
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""
    geminate_digraphs:
      ddzs: dzsdzs
      ccs: cscs
      ggy: gygy
      lly: lyly
      nny: nyny
      ssz: szsz
      tty: tyty
      zzs: zszs
      ddz: dzdz

  - lang: "deu"
    vowels: "aeiouyäöü"
    consonants: "bcdfghjklmnpqrstvwxzß"
    sonorants: "lmnr"
    # Allowable onset clusters; st stays here, gating is done by 'short nucleus' rule.
    # 3-letter clusters spr/str/skr were intentionally dropped: with 3-letter
    # onset support active across the engine they would push Astronomie to
    # A-stro-no-mie, but Duden prefers As-tro-no-mie via the 2-letter "tr".
    clusters_keep_next: ["sp","st","sch","tr","dr","kr","gr","pr","br","fr","fl","kl","gl","pl","bl","sn","sm","sw","sk"]
    dont_split_digraphs: ["sch","ch","qu","ph","th"]
    # Treat these as single (long) nuclei: diphthongs + double vowels + vowel+h lengthening
    digraph_vowels: ["ie","ei","ai","au","eu","äu","aa","ee","oo","ah","eh","ih","oh","uh","äh","öh","üh"]
    glides: "wj"         # 'y' is a vowel in German loanwords
    syllabic_consonants: ""
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""
    # Clusters that should only be kept after long vowels (split after short vowels)
    clusters_only_after_long: ["st"]

  # Dutch (nld) — Germanic, West Germanic. Standard orthographic
  # syllabification per Woordenlijst Nederlandse Taal (Het Groene
  # Boekje, 2015 edition, Nederlandse Taalunie) and Taaladvies.net.
  #
  # Rules:
  #   - one written vowel/digraph per syllable
  #   - V-CV for one intervocalic consonant (ta-fel, ma-ken, lo-pen)
  #   - VC-CV for two intervocalic consonants (kas-teel, mees-ter,
  #     pis-tool) — Dutch does NOT keep s+stop in a 2-cons cluster the
  #     way it keeps muta-cum-liquida (pa-troon, a-tri-um)
  #   - 3+ cluster: at least one consonant stays with the previous
  #     syllable; the trailing 2/3 consonants go to the next onset if
  #     they form a valid Dutch onset (ven-ster, ham-ster, in-dus-trie,
  #     des-truc-tie, pad-den-stoel)
  #   - vowel digraphs aa/ee/oo/uu (long) and ie/oe/eu/ei/ij/au/ou/ui
  #     (diphthongs) form a single nucleus
  #   - ch is a single phoneme /x/ (la-chen, bo-chel)
  #   - hiatus: adjacent vowels not forming a digraph split, often
  #     marked by diaeresis (idee-ën, pa-ti-ënt)
  #
  # The `clusters_keep_next` / `trailing_onsets` split mirrors the
  # 2-cons / 3-cons distinction: muta-cum-liquida (br, bl, dr, kr, kl,
  # pr, pl, tr, vr, ...) always glues, s+stop and the diminutive "tj"
  # only when preceded by another consonant in a 3+ cluster.
  #
  # Known limitations of an orthographic algorithm:
  #   - Morpheme boundary cases: "ab-rupt" (Latin prefix ab- + rupt) is
  #     produced as "a-brupt" because "br" is a valid onset and we have
  #     no morphology. Similar for some Latin prefix words.
  #   - The diminutive suffix -tje after a vowel-final stem
  #     (jon-ge-tje, au-toot-je) needs lexical knowledge — without it
  #     the engine produces jon-get-je.
  #
  # Auto-detect: Dutch has no unique characters relative to its
  # Germanic neighbours (alphabet is essentially a subset of German).
  # Pass `lang="nld"` explicitly.
  #
  # Sources:
  #   - Woordenlijst Nederlandse Taal (Het Groene Boekje, 2015)
  #   - Taaladvies.net (Nederlandse Taalunie)
  #   - nl.wiktionary.org (verified individual hyphenations)
  - lang: "nld"
    vowels: "aeiouyëïöü"
    consonants: "bcdfghjklmnpqrstvwxz"
    sonorants: "lmnr"
    clusters_keep_next: ["br", "bl", "dr", "fr", "fl", "gr", "gl", "kr", "kl", "pr", "pl", "tr", "vr", "wr"]
    trailing_onsets: ["st", "sp", "sk", "sl", "sm", "sn", "sj", "tj", "sch"]
    dont_split_digraphs: ["ch"]
    digraph_vowels: [
      # Long vowels
      "aa", "ee", "oo", "uu",
      # Diphthongs
      "ie", "oe", "eu", "ei", "ij", "au", "ou", "ui",
      # Triphthongs — single nucleus (draai, mooi, moei-te, leeuw, nieuw)
      "aai", "ooi", "oei", "eeu", "ieu"
    ]
    glides: "j"
    syllabic_consonants: ""
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""
    split_hiatus: true

  # Finnish (fin) — Uralic, Finnic. Standard orthographic syllabification
  # per VISK (Iso suomen kielioppi, §11–14) and Karlsson (1999).
  #
  # Rules:
  #   - V-CV for one intervocalic consonant (ka-la, ta-lo)
  #   - VC-CV for two or more — only the LAST consonant moves to the next
  #     onset (kis-sa, mat-ka, mah-dol-li-suus)
  #   - long vowels (aa ee ii oo uu yy ää öö) are a single nucleus
  #   - i-diphthongs (V+i: ai ei oi ui yi äi öi) are diphthongs in any
  #     position
  #   - u/y-ending diphthongs (au eu iu ou ey äy iy öy) are listed as
  #     single nuclei too
  #   - opening diphthongs (ie uo yö) are formally diphthongs only in
  #     a root-initial syllable. We list them in `digraph_vowels`
  #     unconditionally because native roots overwhelmingly carry them
  #     in initial position (kie-li, suo-mi, työ, tie, syö, huo-ne) and
  #     non-initial occurrences in derived forms would require lexical
  #     knowledge to disambiguate
  #   - any 3+ vowels split as hiatus (yliopisto → y-li-o-pis-to)
  #
  # Sources:
  #   - VISK §11–14 (kaino.kotus.fi/visk)
  #   - Karlsson, F. (1999). Finnish: An Essential Grammar. Routledge
  #   - Wiktionary, Appendix:Finnish hyphenation
  - lang: "fin"
    vowels: "aeiouyäö"
    consonants: "bcdfghjklmnpqrstvwxzšž"
    sonorants: "lmnr"
    clusters_keep_next: []
    dont_split_digraphs: []
    digraph_vowels: [
      # Long vowels — single nucleus, never split
      "aa", "ee", "ii", "oo", "uu", "yy", "ää", "öö",
      # i-diphthongs (V + i) — diphthong in any position
      "ai", "ei", "oi", "ui", "yi", "äi", "öi",
      # u/y-ending diphthongs listed here
      "au", "eu", "iu", "ou", "ey", "äy", "iy", "öy",
      # Opening diphthongs — formally root-initial only, but treated
      # as a single nucleus everywhere (see header comment)
      "ie", "uo", "yö"
    ]
    glides: "j"
    syllabic_consonants: ""
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""
    split_hiatus: true

  # Swedish (swe) — Germanic, North Germanic. Standard orthographic
  # syllabification per Svenska Akademiens Ordlista (SAOL) and the
  # `enkonsonantsprincipen` ("one consonant moves to the next syllable"
  # — Wikipedia, Avstavning).
  #
  # Rules:
  #   - V-CV for one intervocalic consonant (sko-la, lä-sa, rö-ka)
  #   - VC-CV for two or more (kvin-na, byg-ga, vac-ker) — the last
  #     consonant moves, the rest stay with the previous syllable
  #   - Swedish has no native vowel digraphs (no `aa`/`ee` doubling for
  #     length — vowel quantity is signalled by the following consonant
  #     count, not by writing the vowel twice)
  #   - Adjacent unlike vowels split as hiatus
  #
  # SAOL also recognises the morphology-based `ordledsprincipen`, which
  # splits at compound and derivational boundaries (`glas-ögon`,
  # `mor-gon-tid-ning`). Our orthographic algorithm cannot detect those
  # boundaries, so compounds syllabify by `enkonsonantsprincipen`
  # (`gla-sö-gon` instead of `glas-ögon`). Both forms are listed as
  # acceptable in Swedish style guides.
  #
  # Known limitations of the orthographic algorithm:
  #   - `ck` is the geminate of `k`. SAOL allows both `vack-er` and
  #     `vac-ker`; we produce `vac-ker` (strict VC-CV).
  #   - `ng` representing /ŋ/ is by exception kept entirely in the
  #     preceding coda (`ving-ar`); without phonetic input we split it
  #     as plain VC-CV (`vin-gar`). Both are encountered in practice.
  #   - `sj/sk/skj/stj/sch` and `tj/kj` digraphs for /ɧ/ and /ɕ/ stay
  #     with the next syllable only when they precede a soft vowel.
