rules:
  - lang: "eng"
    vowels: "aeiouy"
    consonants: "bcdfghjklmnpqrstvwxyz"
    sonorants: "lmnr"
    clusters_keep_next: ["bl", "br", "cl", "cr", "dr", "fl", "fr", "gl", "gr", "pl", "pr", "sl", "sm", "sn", "sp", "st", "sw", "tr", "tw"]
    dont_split_digraphs: ["ch", "sh", "th", "ph", "wh", "ck", "gh", "qu"]
    digraph_vowels: ["ea", "ee", "oo", "ou", "ie", "ei", "ai", "ay", "oy", "oi", "ue"]
    glides: "wy"
    syllabic_consonants: ""
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""
    # Word-final sequences that should not be split (care, here, more, cure, fire)
    # These are kept together at word end or before light suffixes (-s, -less, -ful, -ly, -ing, -ed)
    final_sequences_keep: ["are", "ere", "ire", "ore", "ure"]
    # Suffixes that break V-r-e pattern (parent -> par-ent, adherent -> ad-her-ent)
    suffixes_break_vre: ["ent", "ents", "ence", "ency", "ment", "ments"]
    # Light suffixes that don't break V-r-e pattern (care-less, care-ful)
    suffixes_keep_vre: ["s", "ed", "ing", "less", "ful", "fully", "ly", "ness"]

  - lang: "rus"
    vowels: "аеёиоуыэюя"
    consonants: "бвгджзйклмнпрстфхцчшщ"
    sonorants: "лмнрй"
    clusters_keep_next: ["бл", "бр", "кл", "кр", "др", "тр", "пл", "пр", "сл", "см", "сн", "сп", "ст", "ск", "фл", "фр", "гр", "гл"]
    dont_split_digraphs: []
    digraph_vowels: ["ье", "ья", "ьё", "ьи"]
    glides: "й"
    syllabic_consonants: ""
    modifiers_attach_left: "ь"
    modifiers_attach_right: ""
    modifiers_separators: "ъ"

  - lang: "srp-cyrl"
    vowels: "аиуео"
    consonants: "бвгдђжзјклљмнњпрстћфхцчџш"
    sonorants: "лљмнњрј"
    clusters_keep_next: ["бр", "кр", "др", "тр", "пр", "гр", "гл", "пл", "кл", "сп", "ст", "ск"]
    dont_split_digraphs: []
    digraph_vowels: []
    glides: "ј"
    syllabic_consonants: "р"
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""

  - lang: "srp-latn"
    vowels: "aeiou"
    consonants: "bcčćdžđfghjklmnprsštvzž"
    sonorants: "lmnrj"
    clusters_keep_next: ["br", "kr", "dr", "tr", "pr", "gr", "gl", "pl", "kl", "sp", "st", "sk"]
    dont_split_digraphs: ["nj", "lj", "dž", "dj"]
    digraph_vowels: []
    glides: "j"
    syllabic_consonants: "r"
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""

  # Kazakh — Cyrillic alphabet with Turkic extras (ә, і, ң, ө, ұ, ү, ғ, қ, һ).
  # Standard Turkic syllabification: only one consonant moves to the next
  # syllable, so clusters_keep_next is empty. Three-consonant clusters fall
  # apart 2|1 by the default long-cluster rule (boundary before the last
  # consonant).
  #
  # Loanwords and proper names with foreign onset clusters (Қазақстан →
  # Қа-зақ-стан, галстук → гал-стук) require lexical knowledge to split
  # the normative way. Keeping a rule-based "no dictionary" stance we let
  # them fall through the native algorithm (Қа-зақс-тан, галс-тук) at the
  # cost of being incorrect on those specific words. Adding ст/сп/ск to
  # clusters_keep_next would fix the loanwords but break native words like
  # ұс-таз (would become ұ-стаз), which is worse.
  - lang: "kaz"
    vowels: "аәеёиоөуұүыіэюя"
    consonants: "бвгғджзйкқлмнңпрстфхһцчшщ"
    sonorants: "лмнңрй"
    clusters_keep_next: []
    dont_split_digraphs: []
    digraph_vowels: []
    glides: "й"
    syllabic_consonants: ""
    modifiers_attach_left: "ь"
    modifiers_attach_right: ""
    modifiers_separators: "ъ"

  # Kyrgyz — Cyrillic alphabet with Turkic extras (ң, ө, ү). Long vowels
  # (аа, ээ, оо, ии, уу, өө, үү) form a single nucleus and never split:
  # буу-дай, not бу-удай; тоо-луу, not то-олуу.
  #
  # Same loanword caveat as Kazakh: Кыргызстан → Кыр-гызс-тан under the
  # native algorithm rather than the normative Кыр-гыз-стан, because that
  # would require lexical knowledge.
  #
  # Auto-detect: a Kyrgyz sample built only from Cyrillic letters that also
  # appear in Russian will be detected as `rus` (it comes first in the
  # rules file). A sample containing ң/ө/ү will be detected as `kaz`, since
  # Kazakh's alphabet is a superset of Kyrgyz's. Either way, callers
  # wanting Kyrgyz handling should pass lang="kir" explicitly.
  - lang: "kir"
    vowels: "аеёиоөуүыэюя"
    consonants: "бвгджзйклмнңпрстфхцчшщ"
    sonorants: "лмнңрй"
    clusters_keep_next: []
    dont_split_digraphs: []
    digraph_vowels: ["аа", "ээ", "оо", "ии", "уу", "өө", "үү"]
    glides: "й"
    syllabic_consonants: ""
    modifiers_attach_left: "ь"
    modifiers_attach_right: ""
    modifiers_separators: "ъ"

  - lang: "tur"
    vowels: "aeıioöuü"
    consonants: "bcçdfgğhjklmnprsştvyz"
    sonorants: "lmnr"
    clusters_keep_next: ["br", "bl", "kr", "kl", "pr", "pl", "tr", "dr", "fr", "fl", "gr", "gl"]  # rare in native words, mostly in loanwords
    dont_split_digraphs: []  # Turkish orthography doesn't use digraphs
    digraph_vowels: []       # No vowel digraphs in Turkish
    glides: "y"
    syllabic_consonants: ""  # Turkish doesn't have syllabic consonants
    modifiers_attach_left: ""  # No diacritic markers as separate letters
    modifiers_attach_right: ""
    modifiers_separators: ""

  # Hungarian (AkH 12 §226). Key rules encoded here:
  #
  #   1. Only one consonant moves to the next syllable, regardless of which
  #      cluster it forms. So clusters_keep_next is empty — "ablak" splits
  #      as "ab-lak", not "a-blak"; "macska" as "macs-ka"; "asztal" as
  #      "asz-tal".
  #   2. cs, dz, dzs, gy, ly, ny, sz, ty, zs are single consonants and
  #      cannot be split.
  #   3. Geminate digraphs are written in a simplified form
  #      (ssz=sz+sz, ggy=gy+gy, nny, lly, tty, ccs, zzs, ddz, ddzs) but
  #      restored in FULL on both sides of a line break:
  #      asz-szony, meny-nyi, ösz-sze, pogy-gyász. Encoded as
  #      geminate_digraphs and pre-expanded by LanguageRule before
  #      tokenisation.
  - lang: "hun"
    vowels: "aeiouáéíóöőúüű"
    consonants: "bcdfghjklmnpqrstvwxyz"
    sonorants: "lmnrj"
    clusters_keep_next: []
    dont_split_digraphs: ["dzs", "cs", "dz", "gy", "ly", "ny", "sz", "ty", "zs"]
    digraph_vowels: []
    glides: "j"
    syllabic_consonants: ""
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""
    geminate_digraphs:
      ddzs: dzsdzs
      ccs: cscs
      ggy: gygy
      lly: lyly
      nny: nyny
      ssz: szsz
      tty: tyty
      zzs: zszs
      ddz: dzdz

  - lang: "deu"
    vowels: "aeiouyäöü"
    consonants: "bcdfghjklmnpqrstvwxzß"
    sonorants: "lmnr"
    # Allowable onset clusters; st stays here, gating is done by 'short nucleus' rule
    clusters_keep_next: ["sp","st","sch","tr","dr","kr","gr","pr","br","fr","fl","kl","gl","pl","bl","sn","sm","sw","sk","spr","str","skr"]
    dont_split_digraphs: ["sch","ch","qu","ph","th"]
    # Treat these as single (long) nuclei: diphthongs + double vowels + vowel+h lengthening
    digraph_vowels: ["ie","ei","ai","au","eu","äu","aa","ee","oo","ah","eh","ih","oh","uh","äh","öh","üh"]
    glides: "wj"         # 'y' is a vowel in German loanwords
    syllabic_consonants: ""
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""
    # Clusters that should only be kept after long vowels (split after short vowels)
    clusters_only_after_long: ["st"]

  - lang: "fra"
    vowels: "aeiouyàâäéèêëïîôùûüœæ"
    consonants: "bcdfghjklmnpqrstvwxzç"
    sonorants: "lmnr"
    clusters_keep_next: ["bl", "br", "cl", "cr", "dr", "fl", "fr", "gl", "gr", "pl", "pr", "tr", "vr", "ch", "ph", "th"]
    dont_split_digraphs: ["ch", "ph", "gn", "th", "qu"]
    digraph_vowels: ["ai", "ei", "au", "eau", "eu", "œu", "ou", "oi", "ui"]
    glides: "wy"
    syllabic_consonants: ""
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""

  - lang: "ron"
    vowels: "aeiouăâî"
    consonants: "bcdfghjklmnprsștțvwxz"
    sonorants: "lmnr"
    # Only C + l/r clusters stay together (DOOM orthographic norm)
    # sp, st, sc, șt split between vowels (e.g., răs-puns, dra-gos-te)
    clusters_keep_next: ["bl", "br", "cl", "cr", "dr", "fl", "fr", "gl", "gr", "pl", "pr", "tr", "vr"]
    dont_split_digraphs: ["ch", "gh"]
    # ea, oa are true diphthongs (falling); ia, iu are rising diphthongs
    digraph_vowels: ["ea", "oa", "ia", "iu"]
    glides: ""
    syllabic_consonants: ""
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""
    # Split adjacent vowels that are not diphthongs (e.g., pri-e-teni)
    split_hiatus: true
    # Final -i after consonant is a semivowel (palatalization), not a separate syllable
    final_semivowels: "i"

  - lang: "spa"
    vowels: "aeiouáéíóúü"
    consonants: "bcdfghjklmnñpqrstvwxyz"
    sonorants: "lmnñr"
    clusters_keep_next: ["bl", "br", "cl", "cr", "dr", "fl", "fr", "gl", "gr", "pl", "pr", "tr"]
    dont_split_digraphs: ["ch", "ll", "rr", "qu", "gu"]
    digraph_vowels: ["ai", "au", "ei", "eu", "oi", "ou", "ia", "ie", "io", "iu", "ua", "ue", "ui", "uo"]
    glides: "iu"
    syllabic_consonants: ""
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""

  - lang: "por"
    vowels: "aeiouáàâãéêíóôõúü"
    consonants: "bcçdfghjklmnpqrstvwxz"
    sonorants: "lmnr"
    clusters_keep_next: ["bl", "br", "cl", "cr", "dr", "fl", "fr", "gl", "gr", "pl", "pr", "tr", "vr"]
    dont_split_digraphs: ["ch", "lh", "nh", "qu", "gu"]
    digraph_vowels: ["ai", "au", "ei", "eu", "oi", "ou", "ui", "ão", "õe", "ãe"]
    glides: ""
    syllabic_consonants: ""
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""

  - lang: "pol"
    vowels: "aeiouyąęó"
    consonants: "bcćdfghjklłmnńprsśtwzźż"
    sonorants: "lłmnńrj"
    clusters_keep_next: ["br", "bl", "cr", "cl", "dr", "dł", "fr", "fl", "gr", "gl", "kr", "kl", "pr", "pl", "tr", "tł", "wr", "wl", "sk", "sp", "st", "skr", "spr", "str"]
    dont_split_digraphs: ["sz", "cz", "rz", "dz", "ch"]
    digraph_vowels: []
    glides: "j"
    syllabic_consonants: ""
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""

  - lang: "lat"
    vowels: "aeiouyāēīōūȳăĕĭŏŭ"
    consonants: "bcdfghjklmnpqrstvxz"
    sonorants: "lmnr"
    # muta cum liquida clusters only (stop + l/r)
    clusters_keep_next: ["bl", "br", "cl", "cr", "dr", "fl", "fr", "gl", "gr", "pl", "pr", "tr", "qu"]
    dont_split_digraphs: ["ch", "ph", "th", "rh", "qu"]
    digraph_vowels: ["ae", "oe", "au", "eu"]
    glides: ""
    syllabic_consonants: ""
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""
    split_hiatus: true

  - lang: "kat"
    vowels: "აეიოუ"
    consonants: "ბგდვზთკლმნპრსტფქღყშჩცძწჟხჯჰ"
    sonorants: "ლმნრ"
    # Allow only these onset clusters (whitelist). Anything else -> split V.CV
    clusters_keep_next:
      ["ბრ","ბლ","გრ","გლ","დრ","პრ","პლ","ტრ","კრ","კლ","ფრ","ფლ",
       "კვ","გვ","ტვ","თვ","შვ","ჭვ","ჩვ","ცვ","წვ","ხვ"]
    dont_split_digraphs: []   # No digraphs in modern Georgian
    digraph_vowels: []        # No vowel digraphs: split any V+V (hiatus)
    glides: ""                # No glides: force split for sequences like იე -> ი-ე
    syllabic_consonants: ""   # No syllabic consonants
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""
    split_hiatus: true

  # Latvian — Latin alphabet with macron (ā ē ī ū) and cedilla
  # (ģ ķ ļ ņ š č ž) marks. Standard syllabification: V-CV / VC-CV, with
  # muta-cum-liquida onset clusters kept together (la-brīt, an-tre-sols).
  # Diphthongs ai/au/ei/ie/iu/oi/ui/eu/ou form a single nucleus and never
  # split (lie-li, pal-dies, draugs).
  #
  # Placed after lat to preserve historical Latin detection: macron vowels
  # (ā, ē, ī, ū) are shared between Latvian and Latin, so a sample without
  # Latvian-unique cedilla letters (ģ, ķ, ļ, ņ) is indistinguishable.
  # Stable sort keeps lat first for shared-character samples; users get lav
  # by explicit lang= or by a cedilla letter in the text.
  - lang: "lav"
    vowels: "aāeēiīouū"
    consonants: "bcčdfgģhjkķlļmnņpršstvzž"
    sonorants: "lļmnņr"
    clusters_keep_next: ["bl", "br", "cl", "cr", "dr", "fl", "fr", "gl", "gr", "kl", "kr", "pl", "pr", "tr"]
    # dz and dž are affricates ([dz], [dʒ]) — one consonant phonemically,
    # so they stay together at the syllable boundary (re-dzēt, džem-pe-ris).
    dont_split_digraphs: ["dz", "dž"]
    digraph_vowels: ["ai", "au", "ei", "ie", "iu", "oi", "ui", "eu", "ou"]
    glides: "j"
    syllabic_consonants: ""
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""

  # Bosnian, Croatian, Montenegrin (BCMS) share the orthography with Serbian
  # but differ in two systematic ways encoded below:
  #
  #   1. Long-jat reflex "ije" / "ије" is a single syllable nucleus.
  #      Rule P11 from Matešić (2015) "Postupak automatskoga slogovanja",
  #      GOVOR 32(1), https://hrcak.srce.hr/file/244984 — confirmed by the
  #      Croatian school grammar https://gramatika.hr/pravilo/slog-i-rastavljanje-rijeci-na-slogove/2/
  #      (bijel, cvijet, riječ, snijeg never split).
  #
  #   2. "dj" is two phonemes [d]+[j] (odjenuti, odjeća), not a digraph
  #      for đ as it is in srp-latn typographic substitutions.
  #
  # P11 lists two graphic-but-not-jat exceptions ("dvije", "prije") — those
  # are handled via the `exceptions` field rather than a special-case
  # algorithm, since they cannot be distinguished from real jat by surface form.
  #
  # New BCMS rules are placed AFTER all existing rules so stable-sort tie-breaks
  # in the detector keep historical behaviour: text within the BCMS alphabet
  # (no Polish-unique or other diacritics) still detects as srp-latn first,
  # matching prior releases. Users get bos/hrv/cnr by explicit lang= argument.

  - lang: "bos"
    vowels: "aeiou"
    consonants: "bcčćdžđfghjklmnprsštvzž"
    sonorants: "lmnrj"
    clusters_keep_next: ["br", "kr", "dr", "tr", "pr", "gr", "gl", "pl", "kl", "sp", "st", "sk"]
    dont_split_digraphs: ["nj", "lj", "dž"]
    digraph_vowels: ["ije"]
    glides: "j"
    syllabic_consonants: "r"
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""
    exceptions:
      dvije: "dvi-je"
      prije: "pri-je"

  - lang: "hrv"
    vowels: "aeiou"
    consonants: "bcčćdžđfghjklmnprsštvzž"
    sonorants: "lmnrj"
    clusters_keep_next: ["br", "kr", "dr", "tr", "pr", "gr", "gl", "pl", "kl", "sp", "st", "sk"]
    dont_split_digraphs: ["nj", "lj", "dž"]
    digraph_vowels: ["ije"]
    glides: "j"
    syllabic_consonants: "r"
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""
    exceptions:
      dvije: "dvi-je"
      prije: "pri-je"

  # Montenegrin Latin adds ś (U+015B) and ź (U+017A); introduced into the
  # standard in 2009 (see Pravopis crnogorskoga jezika).
  - lang: "cnr-latn"
    vowels: "aeiou"
    consonants: "bcčćdžđfghjklmnprsśštvzźž"
    sonorants: "lmnrj"
    clusters_keep_next: ["br", "kr", "dr", "tr", "pr", "gr", "gl", "pl", "kl", "sp", "st", "sk"]
    dont_split_digraphs: ["nj", "lj", "dž"]
    digraph_vowels: ["ije"]
    glides: "j"
    syllabic_consonants: "r"
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""
    exceptions:
      dvije: "dvi-je"
      prije: "pri-je"

  # Montenegrin Cyrillic adds с́ and з́ — decomposed only (base letter +
  # combining acute U+0301; no precomposed Unicode points exist for these).
  # The combining acute attaches to the preceding consonant token via the
  # same modifiers_attach_left mechanism rus uses for ь.
  #
  # The composed sequences с́, з́ are also listed in consonants so that ports
  # working at different unit levels recognise them: Python and the JVM
  # iterate codepoints (they see `с` and `́` separately, the latter handled
  # by modifiers_attach_left); Swift iterates extended grapheme clusters
  # and matches the composed Character `с́` directly. In Python and JVM the
  # extra codepoints are redundant — modifier_attach_left fires first — but
  # harmless.
  - lang: "cnr-cyrl"
    vowels: "аиуео"
    consonants: "бвгдђжзјклљмнњпрстћфхцчџшс́з́"
    sonorants: "лљмнњрј"
    clusters_keep_next: ["бр", "кр", "др", "тр", "пр", "гр", "гл", "пл", "кл", "сп", "ст", "ск"]
    dont_split_digraphs: []
    digraph_vowels: ["ије"]
    glides: "ј"
    syllabic_consonants: "р"
    modifiers_attach_left: "́"
    modifiers_attach_right: ""
    modifiers_separators: ""
    exceptions:
      двије: "дви-је"
      прије: "при-је"
