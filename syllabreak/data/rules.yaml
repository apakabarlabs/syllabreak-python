  # Eastern Armenian (hye) — Armenian alphabet (U+0531..U+0587). School
  # orthographic syllabification with a strict VC-CV model. The same model
  # works for Western Armenian — the consonant/vowel inventory is shared,
  # only phonetic values differ.
  #
  # Rules:
  #   - one syllable per *written* vowel (no schwa epenthesis: the
  #     epenthetic schwa that surfaces in pronunciation between consonant
  #     clusters — դպրոց → [də.pə.rɔts] — is not orthographic and the
  #     algorithm does not insert it)
  #   - V-CV for one intervocalic consonant
  #   - VC-CV for two consonants ("Word-internally, -CC- is perceived as
  #     a natural syllable boundary")
  #   - VCC-CV for three (only one consonant moves to the next onset)
  #   - no `clusters_keep_next`: Armenian native phonotactics disallow
  #     CCV- onsets, so every internal cluster splits
  #
  # Letters:
  #   - 7 single-letter vowel signs: ա ե է ը ի ո օ
  #   - 1 vowel digraph: ու = /u/ — never splits, treated as a single
  #     nucleus (Sahak Petrosyan, hyph-hy.tex; also Dum-Tragut §1.3)
  #   - 1 vowel-bearing ligature: և (U+0587, /jɛv/) — listed as a vowel
  #     following Sahak Petrosyan and standard school practice; the
  #     nucleus is /ɛ/. The non-ligature uppercase equivalent is ԵՎ
  #     (Ե + Վ) and falls out automatically as vowel + consonant: ԱՐԵՎ
  #     → Ա-ՐԵՎ via V-CV.
  #   - յ = /j/ — a consonant glide. Words like մայր / հայ / հայր are
  #     therefore monosyllabic under V-CV without any digraph encoding,
  #     because յ cannot be a syllable nucleus.
  #
  # Sources:
  #   - Notes on Syllabification in Classical Armenian, Univ. College
  #     Oxford (users.ox.ac.uk/~univ2665/Arm/notes2.pdf) — direct quote on
  #     internal CC behaviour
  #   - Dum-Tragut, J. (2009). Armenian: Modern Eastern Armenian.
  #     Benjamins, §1.4 (syllable structure as strict C(j)VCC)
  #   - Petrosyan, S. (2010). hyph-hy.tex — TeX hyphenation patterns for
  #     Armenian (CTAN hyph-utf8)
  - lang: "hye"
    vowels: "աեէըիոօև"
    consonants: "բգդզթժլխծկհձղճմյնշչպջռսվտրցւփքֆ"
    sonorants: "լմնռր"
    clusters_keep_next: []
    dont_split_digraphs: []
    digraph_vowels: ["ու"]
    glides: "յ"
    syllabic_consonants: ""
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""
    # Vowel-vowel adjacency is hiatus, never a diphthong (the only vowel
    # combination that stays together is the digraph ու). նաև → նա-և.
    split_hiatus: true

  # Latvian — Latin alphabet with macron (ā ē ī ū) and cedilla
  # (ģ ķ ļ ņ š č ž) marks. Standard syllabification: V-CV / VC-CV, with
  # muta-cum-liquida onset clusters kept together (la-brīt, an-tre-sols).
  # Diphthongs ai/au/ei/ie/iu/oi/ui/eu/ou form a single nucleus and never
  # split (lie-li, pal-dies, draugs).
  #
  # Placed after lat to preserve historical Latin detection: macron vowels
  # (ā, ē, ī, ū) are shared between Latvian and Latin, so a sample without
  # Latvian-unique cedilla letters (ģ, ķ, ļ, ņ) is indistinguishable.
  # Stable sort keeps lat first for shared-character samples; users get lav
  # by explicit lang= or by a cedilla letter in the text.
  - lang: "lav"
    vowels: "aāeēiīouū"
    consonants: "bcčdfgģhjkķlļmnņpršstvzž"
    sonorants: "lļmnņr"
    clusters_keep_next: ["bl", "br", "cl", "cr", "dr", "fl", "fr", "gl", "gr", "kl", "kr", "pl", "pr", "tr"]
    # dz and dž are affricates ([dz], [dʒ]) — one consonant phonemically,
    # so they stay together at the syllable boundary (re-dzēt, džem-pe-ris).
    dont_split_digraphs: ["dz", "dž"]
    digraph_vowels: ["ai", "au", "ei", "ie", "iu", "oi", "ui", "eu", "ou"]
    glides: "j"
    syllabic_consonants: ""
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""

  # Bosnian, Croatian, Montenegrin (BCMS) share the orthography with Serbian
  # but differ in two systematic ways encoded below:
  #
  #   1. Long-jat reflex "ije" / "ије" is a single syllable nucleus.
  #      Rule P11 from Matešić (2015) "Postupak automatskoga slogovanja",
  #      GOVOR 32(1), https://hrcak.srce.hr/file/244984 — confirmed by the
  #      Croatian school grammar https://gramatika.hr/pravilo/slog-i-rastavljanje-rijeci-na-slogove/2/
  #      (bijel, cvijet, riječ, snijeg never split).
  #
  #   2. "dj" is two phonemes [d]+[j] (odjenuti, odjeća), not a digraph
  #      for đ as it is in srp-latn typographic substitutions.
  #
  # P11 lists two graphic-but-not-jat exceptions ("dvije", "prije") — those
  # are handled via the `exceptions` field rather than a special-case
  # algorithm, since they cannot be distinguished from real jat by surface form.
  #
  # New BCMS rules are placed AFTER all existing rules so stable-sort tie-breaks
  # in the detector keep historical behaviour: text within the BCMS alphabet
  # (no Polish-unique or other diacritics) still detects as srp-latn first,
  # matching prior releases. Users get bos/hrv/cnr by explicit lang= argument.

  - lang: "bos"
    vowels: "aeiou"
    consonants: "bcčćdžđfghjklmnprsštvzž"
    sonorants: "lmnrj"
    clusters_keep_next: ["br", "kr", "dr", "tr", "pr", "gr", "gl", "pl", "kl", "sp", "st", "sk"]
    dont_split_digraphs: ["nj", "lj", "dž"]
    digraph_vowels: ["ije"]
    glides: "j"
    syllabic_consonants: "r"
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""
    exceptions:
      dvije: "dvi-je"
      prije: "pri-je"

  - lang: "hrv"
    vowels: "aeiou"
    consonants: "bcčćdžđfghjklmnprsštvzž"
    sonorants: "lmnrj"
    clusters_keep_next: ["br", "kr", "dr", "tr", "pr", "gr", "gl", "pl", "kl", "sp", "st", "sk"]
    dont_split_digraphs: ["nj", "lj", "dž"]
    digraph_vowels: ["ije"]
    glides: "j"
    syllabic_consonants: "r"
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""
    exceptions:
      dvije: "dvi-je"
      prije: "pri-je"

  # Montenegrin Latin adds ś (U+015B) and ź (U+017A); introduced into the
  # standard in 2009 (see Pravopis crnogorskoga jezika).
  - lang: "cnr-latn"
    vowels: "aeiou"
    consonants: "bcčćdžđfghjklmnprsśštvzźž"
    sonorants: "lmnrj"
    clusters_keep_next: ["br", "kr", "dr", "tr", "pr", "gr", "gl", "pl", "kl", "sp", "st", "sk"]
    dont_split_digraphs: ["nj", "lj", "dž"]
    digraph_vowels: ["ije"]
    glides: "j"
    syllabic_consonants: "r"
    modifiers_attach_left: ""
    modifiers_attach_right: ""
    modifiers_separators: ""
    exceptions:
      dvije: "dvi-je"
      prije: "pri-je"

  # Montenegrin Cyrillic adds с́ and з́ — decomposed only (base letter +
  # combining acute U+0301; no precomposed Unicode points exist for these).
  # The combining acute attaches to the preceding consonant token via the
  # same modifiers_attach_left mechanism rus uses for ь.
  #
  # The composed sequences с́, з́ are also listed in consonants so that ports
  # working at different unit levels recognise them: Python and the JVM
  # iterate codepoints (they see `с` and `́` separately, the latter handled
  # by modifiers_attach_left); Swift iterates extended grapheme clusters
  # and matches the composed Character `с́` directly. In Python and JVM the
  # extra codepoints are redundant — modifier_attach_left fires first — but
  # harmless.
  - lang: "cnr-cyrl"
    vowels: "аиуео"
    consonants: "бвгдђжзјклљмнњпрстћфхцчџшс́з́"
    sonorants: "лљмнњрј"
    clusters_keep_next: ["бр", "кр", "др", "тр", "пр", "гр", "гл", "пл", "кл", "сп", "ст", "ск"]
    dont_split_digraphs: []
    digraph_vowels: ["ије"]
    glides: "ј"
    syllabic_consonants: "р"
    modifiers_attach_left: "́"
    modifiers_attach_right: ""
    modifiers_separators: ""
    exceptions:
      двије: "дви-је"
      прије: "при-је"
