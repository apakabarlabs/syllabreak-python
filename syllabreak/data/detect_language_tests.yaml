tests:
  - lang: "eng"
    cases:
      - "hello"
      - "world"
      - "computer"
      - "beautiful"
      - "HELLO"
      - "COMPUTER"
      - "self-service"
      - "twenty-one"
      - "Alice (name)"
      - "(parentheses)"
      - "it's"
      - "don't"
      - "lepo"
  
  - lang: "rus"
    cases:
      - "привет"
      - "мир"
      - "компьютер"
      - "красивый"
      - "школа"
      - "ПРИВЕТ"
      - "КОМПЬЮТЕР"
      - "Музей-усадьба"
      - "Музей-усадьба Коломенское"
      - "кое-что"
      - "из-за"
      - "Алиса (имя)"
      - "(скобки)"
      - "рачунар"
      - "свет"
  
  - lang: "srp-cyrl"
    cases:
      - "ђак"
      - "њега"
      - "ЂАК"
      - "ЊЕГА"
  
  - lang: "srp-latn"
    cases:
      - "čovek"
      - "šuma"
      - "računar"
      - "učitelj"
      - "čaša"
      - "ČOVEK"
      - "ŠUMA"
  
  - lang: "kaz"
    cases:
      # Words with kaz-unique letters (ұ, қ, ғ, і, ә, һ — none of these in rus or kir)
      - "ұстаз"
      - "Қазақстан"
      - "ғылым"
      - "Қазақ"

  - lang: "ell"
    cases:
      # Greek script — entire alphabet is unique to ell/grc among supported
      # languages. (grc is only added once we implement #8.)
      - "καλημέρα"
      - "Έλληνας"
      - "Αθήνα"
      - "ελληνικά"
      - "γράμμα"

  - lang: "lav"
    cases:
      # Latvian and Latin share macron vowels (ā ē ī ū). Only the cedilla
      # letters ļ, ķ, ģ, ņ are truly unique to Latvian among supported
      # languages — words without them cannot be reliably detected.
      - "ļoti"
      - "Ģimene"
      - "puķes"
      - "saņem"

  - lang: "kat"
    cases:
      - "გამარჯობა"
      - "ქალაქი"
      - "საქართველო"
      - "მშვენიერი"
      - "გამარჯობა!"
      - "თბილისი"
  
  - lang: "deu"
    cases:
      - "straße"
      - "fußball"
      - "mädchen"
      - "geschäft"
      - "größe"

  - lang: "fra"
    cases:
      - "château"
      - "œuvre"
      - "cœur"
      - "être"
      - "père"

  - lang: "ron"
